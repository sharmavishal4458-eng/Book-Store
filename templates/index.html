<!DOCTYPE html>
<html>
<head>
    <title>Book Store</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <h1>📚 Book Store</h1>
    <a href="/cart">🛒 Cart</a>
    <a href="/login">🔐 Admin Login</a>
</header>

<div class="book-container">
    {% for book in books %}
    <div class="book-card">
        <img src="{{ book.image }}">
        <h3>{{ book.title }}</h3>
        <p>₹{{ book.price }}</p>
        <a href="/add_to_cart/{{ book.id }}">Add to Cart</a>
    </div>
    {% endfor %}
</div>

</body>
</html>
